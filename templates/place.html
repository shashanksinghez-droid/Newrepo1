<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ place.title }} - Details</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; line-height: 1.8; color: #333; background: #fff; padding: 40px; }
        .container { max-width: 800px; margin: auto; }
        .back-link { margin-bottom: 20px; display: inline-block; color: #d35400; font-weight: bold; }
        h1 { color: #d35400; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .highlight-box { background: #fdf2e9; padding: 20px; border-radius: 8px; margin: 20px 0; border-left: 5px solid #d35400; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">&larr; Back to Home</a>
        <h1>{{ place.title }}</h1>
        <p>{{ place.full_text }}</p>
        
        <div class="highlight-box">
            <h3>Key Highlights:</h3>
            <ul>
                {% for h in place.highlights %}
                <li>{{ h }}</li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
