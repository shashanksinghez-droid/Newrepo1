<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ place.title }} - Detailed Guide</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; line-height: 1.8; color: #333; background: #fff; padding: 50px 20px; }
        .container { max-width: 800px; margin: auto; }
        .back-link { margin-bottom: 30px; display: inline-block; color: #1a5276; font-weight: bold; text-decoration: none; }
        h1 { color: #1a5276; border-bottom: 3px solid #1a5276; padding-bottom: 10px; margin-top: 0; }
        .highlight-box { background: #ebf5fb; padding: 25px; border-radius: 8px; margin: 30px 0; border-left: 6px solid #1a5276; }
        ul { padding-left: 20px; }
        li { margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">&larr; Return to Home</a>
        <h1>{{ place.title }}</h1>
        <p>{{ place.full_text }}</p>
        
        <div class="highlight-box">
            <h3>Key Highlights:</h3>
            <ul>
                {% for h in place.highlights %}
                <li><strong>{{ h }}</strong></li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
