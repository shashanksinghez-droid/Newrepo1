{% extends 'base.html' %}
{% block content %}
<div class="rank-table">
    <h2>GLOBAL LEADERBOARD</h2>
    <table>
        <tr><th>RANK</th><th>PLAYER</th><th>SCORE</th></tr>
        {% for p in players %}
        <tr><td>{{ p.rank }}</td><td>{{ p.name }}</td><td>{{ p.score }}</td></tr>
        {% endfor %}
    </table>
</div>
{% endblock %}
