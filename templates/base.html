<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Phoenix Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="logo">PHOENIX_v1.0</div>
        <div class="lang-links">
            <a href="{{ url_for('set_lang', lang_code='en') }}">English</a>
            <a href="{{ url_for('set_lang', lang_code='es') }}">Español</a>
            <a href="{{ url_for('set_lang', lang_code='hi') }}">हिंदी</a>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
