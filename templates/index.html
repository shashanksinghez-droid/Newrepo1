{% extends 'base.html' %}
{% block content %}
<div class="hero">
    <h1>{{ t['title'] }}</h1>
    <p>{{ t['subtitle'] }}</p>
</div>

<form action="/add" method="POST" class="form-group">
    <input type="text" name="topic" placeholder="{{ t['placeholder'] }}" required>
    <button type="submit">{{ t['btn_add'] }}</button>
</form>

<table>
    <tr>
        <th>{{ t['table_id'] }}</th>
        <th>{{ t['table_topic'] }}</th>
        <th>{{ t['table_date'] }}</th>
    </tr>
    {% for log in logs %}
    <tr>
        <td>{{ log.id }}</td>
        <td style="color: #58a6ff; font-weight: bold;">{{ log.topic }}</td>
        <td style="font-size: 12px; color: #8b949e;">{{ log.date_created.strftime('%Y-%m-%d %H:%M') }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
