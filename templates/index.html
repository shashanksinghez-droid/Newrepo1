<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Azure Starfighter: Advanced Edition</title>
    <style>
        body { margin: 0; background: #020205; color: #4fc3f7; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #game-container { position: relative; border: 3px solid #1a237e; box-shadow: 0 0 30px #0d47a1; }
        canvas { display: block; background: radial-gradient(circle, #0d1117 0%, #000 100%); }
        .hud { position: absolute; top: 10px; left: 10px; pointer-events: none; }
        .score-board { font-size: 24px; font-weight: bold; text-shadow: 0 0 10px #4fc3f7; }
    </style>
</head>
<body>
    <div id="game-container">
        <div class="hud">
            <div class="score-board">ENCRYPTED DATA: <span id="score">0</span> TB</div>
            <div id="powerup-status" style="color: #ffeb3b; font-size: 14px;"></div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 900;
canvas.height = 600;

// --- GAME STATE ---
let score = 0;
let frames = 0;
let gameActive = true;
let powerupTimer = 0;

// --- CLASSES ---
class Player {
    constructor() {
        this.x = 50;
        this.y = canvas.height / 2;
        this.w = 40;
        this.h = 30;
        this.speed = 7;
    }
    draw() {
        ctx.shadowBlur = 15; ctx.shadowColor = "#4fc3f7";
        ctx.fillStyle = "#4fc3f7";
        // Draw a futuristic ship shape
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(this.x + this.w, this.y + this.h/2);
        ctx.lineTo(this.x, this.y + this.h);
        ctx.lineTo(this.x + 10, this.y + this.h/2);
        ctx.closePath();
        ctx.fill();
    }
}

class Projectile {
    constructor(x, y) {
        this.x = x; this.y = y;
        this.radius = 3;
        this.speed = 10;
    }
    draw() {
        ctx.fillStyle = "#ffeb3b";
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
    }
    update() { this.x += this.speed; }
}

class Enemy {
    constructor() {
        this.x = canvas.width + 50;
        this.y = Math.random() * (canvas.height - 40);
        this.w = 30; this.h = 30;
        this.speed = 3 + Math.random() * 3;
        this.hp = 1;
    }
    draw() {
        ctx.fillStyle = "#f44336";
        ctx.shadowColor = "#f44336";
        ctx.fillRect(this.x, this.y, this.w, this.h);
    }
    update() { this.x -= this.speed; }
}

class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        this.velocity = { x: (Math.random() - 0.5) * 5, y: (Math.random() - 0.5) * 5 };
        this.alpha = 1;
    }
    draw() {
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, 2, 2);
        ctx.globalAlpha = 1;
    }
    update() {
        this.x += this.velocity.x;
        this.y += this.velocity.y;
        this.alpha -= 0.02;
    }
}

// --- ARRAYS ---
const player = new Player();
const projectiles = [];
const enemies = [];
const particles = [];
const stars = Array.from({length: 100}, () => ({
    x: Math.random() * canvas.width, 
    y: Math.random() * canvas.height, 
    size: Math.random() * 2,
    speed: 0.5 + Math.random() * 2
}));

// --- INPUTS ---
const keys = {};
window.onkeydown = (e) => keys[e.code] = true;
window.onkeyup = (e) => keys[e.code] = false;

function shoot() {
    projectiles.push(new Projectile(player.x + player.w, player.y + player.h/2));
}

// --- ENGINE ---
function animate() {
    if (!gameActive) return;
    requestAnimationFrame(animate);
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 1. Draw Parallax Stars
    stars.forEach(s => {
        ctx.fillStyle = "#fff";
        ctx.fillRect(s.x, s.y, s.size, s.size);
        s.x -= s.speed;
        if (s.x < 0) s.x = canvas.width;
    });

    // 2. Handle Player Movement
    if (keys['ArrowUp'] && player.y > 0) player.y -= player.speed;
    if (keys['ArrowDown'] && player.y < canvas.height - player.h) player.y += player.speed;
    player.draw();

    // 3. Handle Projectiles
    if (frames % 10 === 0 && (keys['Space'] || keys['KeyX'])) shoot();
    projectiles.forEach((p, i) => {
        p.update(); p.draw();
        if (p.x > canvas.width) projectiles.splice(i, 1);
    });

    // 4. Handle Enemies
    if (frames % 40 === 0) enemies.push(new Enemy());
    enemies.forEach((e, ei) => {
        e.update(); e.draw();
        
        // Collision: Enemy vs Player
        if (player.x < e.x + e.w && player.x + player.w > e.x && player.y < e.y + e.h && player.y + player.h > e.y) {
            gameActive = false;
            alert("SYSTEM FAILURE! Final Score: " + score);
            location.reload();
        }

        // Collision: Projectile vs Enemy
        projectiles.forEach((p, pi) => {
            if (p.x > e.x && p.x < e.x + e.w && p.y > e.y && p.y < e.y + e.h) {
                // Create particles
                for(let k=0; k<10; k++) particles.push(new Particle(e.x, e.y, "#f44336"));
                enemies.splice(ei, 1);
                projectiles.splice(pi, 1);
                score += 10;
                document.getElementById('score').innerText = score;
            }
        });

        if (e.x + e.w < 0) enemies.splice(ei, 1);
    });

    // 5. Particles
    particles.forEach((p, i) => {
        if (p.alpha <= 0) particles.splice(i, 1);
        else { p.update(); p.draw(); }
    });

    frames++;
}

animate();
</script>
</body>
</html>
