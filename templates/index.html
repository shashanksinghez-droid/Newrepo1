<!DOCTYPE html>
<html>
<head>
    <title>Delhi Tourism</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 40px; background: #fdf6e3; color: #657b83; }
        .card { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid #b58900; }
        h1 { color: #cb4b16; }
    </style>
</head>
<body>
    <h1>Welcome to Delhi</h1>
    {% for id, place in places.items() %}
    <div class="card">
        <h2>{{ place.name }}</h2>
        <p>{{ place.info }}</p>
        <strong>Fact:</strong> {{ place.fact }}
    </div>
    {% endfor %}
</body>
</html>
