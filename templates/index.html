<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delhi: The Heart of India</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #fdfbf7; color: #2c3e50; }
        .header { background: #1a5276; color: white; padding: 60px 20px; text-align: center; }
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-top: 6px solid #1a5276; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card h3 { margin-top: 0; color: #1a5276; }
        a { text-decoration: none; color: #1a5276; font-weight: bold; }
        .btn { display: inline-block; margin-top: 15px; padding: 8px 16px; background: #1a5276; color: white; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Discover Delhi</h1>
        <p>A City of History, Culture, and Modernity</p>
    </div>
    <div class="container">
        <div class="grid">
            {% for id, details in places.items() %}
            <div class="card">
                <h3>{{ details.title }}</h3>
                <p>{{ details.description }}</p>
                <a href="/place/{{ id }}" class="btn">Explore {{ details.title }}</a>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
