<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Varanasi Tourism - The City of Lights</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #f4f1ea; color: #333; }
        .hero { background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1561361513-2d000a50f0dc?q=80&w=1200&auto=format&fit=crop'); 
                height: 400px; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; color: white; text-align: center; }
        .container { max-width: 1100px; margin: 2rem auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 1.5rem; }
        .btn { display: inline-block; background: #d35400; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; margin-top: 10px; font-weight: bold; }
        h1 { margin: 0; font-size: 3.5rem; }
        footer { background: #2c3e50; color: white; text-align: center; padding: 2rem 0; margin-top: 4rem; }
    </style>
</head>
<body>
    <div class="hero">
        <div>
            <h1>Divine Varanasi</h1>
            <p>Explore the Temples of the World's Oldest Living City</p>
        </div>
    </div>
    <div class="container">
        <h2 style="text-align:center; margin-bottom: 2rem;">Sacred Temples</h2>
        <div class="grid">
            {% for id, temple in temples.items() %}
            <div class="card">
                <img src="{{ temple.img_url }}" alt="{{ temple.name }}">
                <div class="card-body">
                    <h3>{{ temple.name }}</h3>
                    <p>{{ temple.desc[:100] }}...</p>
                    <a href="/temple/{{ id }}" class="btn">Learn More</a>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
    <footer>
        <p>&copy; 2026 Varanasi Tourism Portal | Managed via Azure App Service</p>
    </footer>
</body>
</html>
